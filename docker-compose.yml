version: '3.8'

services:
  runner:
    build: ./Docker Image
    restart: always
    environment:
      - REPO=<owner>/<repo>
      - REG_TOKEN=<reg-token-for-self-hosted-runner>
      - NAME=<runner-name>
      - DOCKER_HOST=unix:///var/run/docker.sock
      - TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE=/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - go-mod-cache:/home/docker/go/pkg/mod
      - go-build-cache:/home/docker/.cache/go-build
    deploy:
      mode: replicated
      replicas: 1

volumes:
  go-mod-cache:
  go-build-cache: